apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
    
spec:
  project: default
  source:
    repoURL: https://github.com/L00196904/student-performance-argocd
    targetRevision: main
    path: k8s   
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
